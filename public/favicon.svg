<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cf33af"/>
      <stop offset="50%" stop-color="#ff7eb3"/>
      <stop offset="100%" stop-color="#cf33af"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Fondo oscuro con bordes redondeados y un sutil borde rosado -->
  <rect width="100" height="100" rx="25" fill="#0A0A0F" stroke="#cf33af" stroke-width="2" stroke-opacity="0.3"/>
  
  <!-- Letra J estilizada con degradado rosado y ligero glow -->
  <g filter="url(#glow)">
    <path d="M 60 25 L 60 65 C 60 78 50 82 40 82 C 30 82 23 75 23 65" fill="none" stroke="url(#pinkGrad)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 35 25 L 75 25" fill="none" stroke="url(#pinkGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>